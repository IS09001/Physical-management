<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0f11">
<title>デイリー記録</title>
<link rel="manifest" href="./manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0e0f11;
    --bg2: #161719;
    --bg3: #1e2023;
    --border: #2a2d32;
    --text: #e8eaed;
    --text2: #9aa0aa;
    --text3: #5a6070;
    --accent: #4ade80;
    --accent2: #22d3ee;
    --accent3: #f97316;
    --red: #f87171;
    --yellow: #fbbf24;
    --radius: 12px;
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: calc(72px + var(--safe-bottom));
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  .header-date { font-size: 12px; color: var(--text2); }

  /* Nav */
  .nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    padding: 12px 4px 10px;
    background: none;
    border: none;
    color: var(--text3);
    font-size: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; line-height: 1; }

  /* Screens */
  .screen { display: none; padding: 12px 14px; }
  .screen.active { display: block; }

  /* Cards */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Stats row */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 4px; }
  .stat-box { background: var(--bg3); border-radius: 8px; padding: 10px 6px; text-align: center; }
  .stat-val { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; }
  .stat-lbl { font-size: 9px; color: var(--text3); margin-top: 3px; letter-spacing: 0.5px; }
  .stat-box.kcal .stat-val { color: var(--accent2); }
  .stat-box.prot .stat-val { color: var(--accent); }
  .stat-box.fat  .stat-val { color: var(--yellow); }
  .stat-box.carb .stat-val { color: var(--accent3); }

  /* Balance */
  .balance-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .balance-label { font-size: 12px; color: var(--text2); }
  .balance-val { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; }
  .balance-val.plus { color: var(--accent3); }
  .balance-val.minus { color: var(--accent); }

  /* Form inputs */
  input, select, textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    width: 100%;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--bg3); }
  input[type="time"] { font-family: 'Space Mono', monospace; }
  input[type="number"] { font-family: 'Space Mono', monospace; }

  .form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .form-row label { font-size: 12px; color: var(--text2); white-space: nowrap; min-width: 40px; }
  .form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* Buttons */
  .btn {
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    font-size: 13px;
    padding: 10px 14px;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .range-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid #3a1a1a; font-size: 11px; padding: 6px 10px; }
  .btn-sm { padding: 7px 12px; font-size: 12px; }
  .btn-full { width: 100%; }

  /* Meal entries */
  .meal-entry {
    background: var(--bg3);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .meal-info { flex: 1; min-width: 0; }
  .meal-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meal-detail { font-size: 11px; color: var(--text2); margin-top: 2px; font-family: 'Space Mono', monospace; }
  .meal-time { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .meal-kcal { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: var(--accent2); white-space: nowrap; }

  /* Add food panel */
  .add-food-panel {
    background: var(--bg2);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
  }
  .add-food-title { font-size: 12px; color: var(--accent); font-weight: 700; margin-bottom: 12px; }

  /* History */
  .history-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .history-item:active { border-color: var(--accent); }
  .history-date { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .history-stats { display: flex; gap: 12px; flex-wrap: wrap; }
  .history-stat { font-size: 11px; color: var(--text2); }
  .history-stat span { color: var(--text); font-family: 'Space Mono', monospace; }
  .history-balance { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; float: right; }

  /* Food DB */
  .food-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .food-name { font-size: 13px; font-weight: 500; }
  .food-detail { font-size: 11px; color: var(--text2); margin-top: 2px; font-family: 'Space Mono', monospace; }
  .food-kcal { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--accent2); }

  /* Section label */
  .section-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
    margin: 14px 0 8px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    padding: 20px 14px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; align-items: flex-start; padding-top: 60px; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    width: 100%;
    max-width: 450px;
    margin: 0 auto;
  }
  .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
  .modal-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; padding: 0 4px; }

  /* Pill tabs */
  .tabs { display: flex; background: var(--bg3); border-radius: 8px; padding: 3px; margin-bottom: 12px; }
  .tab-btn { flex: 1; padding: 8px; border: none; background: none; color: var(--text2); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .tab-btn.active { background: var(--bg2); color: var(--text); font-weight: 500; }

  /* Gym */
  .gym-set { background: var(--bg3); border-radius: 8px; padding: 8px 12px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
  .gym-set-info { font-size: 12px; }
  .gym-set-vol { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text2); }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 12px 0; }

  /* Empty state */
  .empty { text-align: center; color: var(--text3); padding: 30px 0; font-size: 13px; }

  /* Search */
  .search-box { position: relative; margin-bottom: 8px; }
  .search-box input { padding-left: 36px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }

  /* Chip */
  .chip { display: inline-block; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--text2); margin: 2px; cursor: pointer; }
  .chip:active { border-color: var(--accent); color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--bg3);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 300;
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Detail view */
  .detail-meal { padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 12px; }
  .detail-meal:last-child { border-bottom: none; }

  /* Chart */
  canvas { display:block; }
  .chart-legend { display:flex; gap:12px; flex-wrap:wrap; margin-top:6px; }
  .legend-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text2); }
  .legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  /* Scrollable list */
  .scroll-list { max-height: 280px; overflow-y: auto; }
  .scroll-list::-webkit-scrollbar { width: 4px; }
  .scroll-list::-webkit-scrollbar-track { background: transparent; }
  .scroll-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Badge */
  .badge { display: inline-block; background: var(--accent); color: #000; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">デイリー記録</div>
    <div class="header-date" id="header-date"></div>
  </div>
  <div id="header-badge"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showScreen('today')" id="nav-today">
    <span class="nav-icon">📋</span>今日
  </button>
  <button class="nav-btn" onclick="showScreen('history')" id="nav-history">
    <span class="nav-icon">📅</span>履歴
  </button>
  <button class="nav-btn" onclick="showScreen('gym')" id="nav-gym">
    <span class="nav-icon">🏋️</span>ジム
  </button>
  <button class="nav-btn" onclick="showScreen('body')" id="nav-body">
    <span class="nav-icon">📊</span>体組成
  </button>
  <button class="nav-btn" onclick="showScreen('foods')" id="nav-foods">
    <span class="nav-icon">🍱</span>食品DB
  </button>
</nav>

<!-- ============ TODAY SCREEN ============ -->
<div class="screen active" id="screen-today">

  <!-- Date selector -->
  <div class="card">
    <div class="card-title">日付・睡眠</div>
    <div class="form-row">
      <label>日付</label>
      <input type="date" id="today-date" onchange="loadDay()">
    </div>
    <div class="form-row">
      <label>就寝</label>
      <input type="time" id="sleep-start" placeholder="0:30">
    </div>
    <div class="form-row">
      <label>起床</label>
      <input type="time" id="sleep-end" placeholder="6:00">
    </div>
    <div class="form-hint" id="sleep-duration"></div>
  </div>

  <!-- Totals -->
  <div class="card">
    <div class="card-title">本日の合計</div>
    <div class="stats-grid">
      <div class="stat-box kcal"><div class="stat-val" id="total-kcal">0</div><div class="stat-lbl">kcal</div></div>
      <div class="stat-box prot"><div class="stat-val" id="total-p">0</div><div class="stat-lbl">P(g)</div></div>
      <div class="stat-box fat"><div class="stat-val" id="total-f">0</div><div class="stat-lbl">F(g)</div></div>
      <div class="stat-box carb"><div class="stat-val" id="total-c">0</div><div class="stat-lbl">C(g)</div></div>
    </div>
    <div class="balance-row">
      <div>
        <div class="balance-label">Fit消費</div>
        <div style="display:flex;gap:6px;align-items:center;margin-top:4px;">
          <input type="number" id="fit-kcal" placeholder="2000" style="width:90px;padding:6px 8px;font-size:13px;" oninput="updateBalance()">
          <span style="font-size:11px;color:var(--text3)">kcal</span>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="balance-label">収支</div>
        <div class="balance-val" id="balance-val">—</div>
      </div>
    </div>
  </div>

  <!-- Meal list -->
  <div class="card-title">食事記録</div>
  <div id="meal-list"></div>

  <button class="btn btn-primary btn-full" onclick="openAddFood()" style="margin-bottom:14px;">
    ＋ 食事を追加
  </button>

  <button class="btn btn-secondary btn-full" onclick="saveDay()" style="margin-bottom:6px;">
    💾 この日を保存
  </button>
</div>

<!-- ============ HISTORY SCREEN ============ -->
<div class="screen" id="screen-history">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <div class="card-title" style="margin-bottom:0;">記録履歴</div>
    <div style="display:flex;gap:6px;">
      <button class="btn btn-secondary btn-sm" onclick="exportData()">⬇ 書出</button>
      <label class="btn btn-secondary btn-sm" style="cursor:pointer;margin:0;">⬆ 読込<input type="file" accept=".json" style="display:none" onchange="importData(this.files[0])"></label>
    </div>
  </div>
  <div id="history-list"></div>
</div>

<!-- ============ GYM SCREEN ============ -->
<div class="screen" id="screen-gym">
  <div class="card">
    <div class="card-title">ジムトレーニング</div>
    <div class="form-row">
      <label>日付</label>
      <input type="date" id="gym-date">
    </div>
  </div>

  <!-- Bench press -->
  <div class="card">
    <div class="card-title">🏋️ ベンチプレス</div>
    <div class="form-row">
      <input type="number" id="bp-weight" placeholder="重量 (kg)" style="flex:2">
      <span style="color:var(--text3);font-size:12px;">×</span>
      <input type="number" id="bp-reps" placeholder="回" style="flex:1">
      <span style="color:var(--text3);font-size:12px;">×</span>
      <input type="number" id="bp-sets" placeholder="set" style="flex:1">
      <button class="btn btn-primary btn-sm" onclick="addBpSet()" style="flex-shrink:0;">追加</button>
    </div>
    <div id="bp-list"></div>
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:12px;color:var(--text2);">総挙上量</span>
      <span class="badge" id="bp-total">0 kg</span>
    </div>
  </div>

  <!-- Cardio -->
  <div class="card">
    <div class="card-title">🏃 有酸素</div>
    <div class="form-row">
      <select id="cardio-type" style="flex:2">
        <option>トレッドミル</option>
        <option>リカンベントバイク</option>
        <option>その他</option>
      </select>
      <input type="number" id="cardio-min" placeholder="分" style="flex:1">
      <input type="number" id="cardio-kcal" placeholder="kcal" style="flex:1">
      <button class="btn btn-primary btn-sm" onclick="addCardio()" style="flex-shrink:0;">追加</button>
    </div>
    <div id="cardio-list"></div>
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:12px;color:var(--text2);">機器合計消費</span>
      <span class="badge" id="cardio-total">0 kcal</span>
    </div>
  </div>

  <!-- Other exercises -->
  <div class="card">
    <div class="card-title">💪 その他種目</div>
    <div class="form-row">
      <input type="text" id="ex-name" placeholder="種目名" style="flex:2">
      <input type="number" id="ex-weight" placeholder="kg" style="flex:1">
      <input type="number" id="ex-reps" placeholder="回" style="flex:1">
      <input type="number" id="ex-sets" placeholder="set" style="flex:1">
      <button class="btn btn-primary btn-sm" onclick="addExercise()" style="flex-shrink:0;">追加</button>
    </div>
    <div id="ex-list"></div>
  </div>

  <button class="btn btn-secondary btn-full" onclick="saveGym()">💾 ジム記録を保存</button>
</div>

<!-- ============ BODY SCREEN ============ -->
<div class="screen" id="screen-body">

  <!-- Input card -->
  <div class="card">
    <div class="card-title">体組成を記録</div>
    <div class="form-row">
      <label>日付</label>
      <input type="date" id="body-date">
    </div>
    <div class="form-row">
      <label>体重</label>
      <input type="number" id="body-weight" placeholder="kg" step="0.1">
      <span style="font-size:12px;color:var(--text3);margin-left:4px;">kg</span>
    </div>
    <div class="form-row">
      <label>体脂肪率</label>
      <input type="number" id="body-fat" placeholder="%" step="0.1">
      <span style="font-size:12px;color:var(--text3);margin-left:4px;">%</span>
    </div>
    <div class="form-row">
      <label>メモ</label>
      <input type="text" id="body-memo" placeholder="任意">
    </div>
    <button class="btn btn-primary btn-full" onclick="saveBody()" style="margin-top:6px;">💾 保存</button>
  </div>

  <!-- Graph selector -->
  <div class="card">
    <div class="card-title">グラフ</div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchGraph('balance')" id="gtab-balance">収支</button>
      <button class="tab-btn" onclick="switchGraph('pfc')" id="gtab-pfc">PFC</button>
      <button class="tab-btn" onclick="switchGraph('body')" id="gtab-body">体組成</button>
      <button class="tab-btn" onclick="switchGraph('sleep')" id="gtab-sleep">睡眠</button>
      <button class="tab-btn" onclick="switchGraph('gym')" id="gtab-gym">ジム</button>
    </div>
    <div style="margin-bottom:8px;display:flex;gap:4px;flex-wrap:wrap;" id="range-btns">
      <button class="btn btn-secondary btn-sm range-btn active" onclick="setGraphRange(7)" data-r="7">1週</button>
      <button class="btn btn-secondary btn-sm range-btn" onclick="setGraphRange(14)" data-r="14">2週</button>
      <button class="btn btn-secondary btn-sm range-btn" onclick="setGraphRange(90)" data-r="90">3ヶ月</button>
      <button class="btn btn-secondary btn-sm range-btn" onclick="setGraphRange(180)" data-r="180">半年</button>
      <button class="btn btn-secondary btn-sm range-btn" onclick="setGraphRange(365)" data-r="365">1年</button>
      <button class="btn btn-secondary btn-sm range-btn" onclick="setGraphRange(0)" data-r="0">全期間</button>
      <button class="btn btn-secondary btn-sm range-btn" onclick="toggleCustomRange()" data-r="custom">カスタム</button>
    </div>
    <div id="custom-range" style="display:none;margin-bottom:8px;display:none;">
      <div class="form-row" style="gap:6px;">
        <input type="date" id="range-from" style="flex:1;font-size:12px;padding:6px 8px;">
        <span style="color:var(--text3);font-size:12px;align-self:center;">〜</span>
        <input type="date" id="range-to" style="flex:1;font-size:12px;padding:6px 8px;">

<script>
// ==================== DATA ====================
const DEFAULT_FOODS = [
  { id:'f1', name:'自家製サラダチキン', unit:'g', kcal:113, p:23.3, f:1.9, c:0 },
  { id:'f2', name:'絹ごし豆腐300g', unit:'個', kcal:153, p:15.0, f:7.5, c:7.5 },
  { id:'f3', name:'木綿豆腐300g', unit:'個', kcal:186, p:15.0, f:11.4, c:6.6 },
  { id:'f4', name:'バスマティライス', unit:'g', kcal:351, p:8.0, f:0.6, c:78.0 },
  { id:'f5', name:'中華麺(乾)', unit:'g', kcal:346, p:11.0, f:1.5, c:72.1 },
  { id:'f6', name:'パスタ(乾)', unit:'g', kcal:358, p:14.6, f:1.5, c:69.8 },
  { id:'f7', name:'ローソン パリパリチキン', unit:'個', kcal:180, p:16.9, f:11.3, c:2.8 },
  { id:'f8', name:'ローソン Lチキ レッド', unit:'個', kcal:247, p:12.4, f:16.4, c:12.7 },
  { id:'f9', name:'ローソン まんまる鶏', unit:'個', kcal:217, p:17.2, f:13.1, c:7.8 },
  { id:'f10', name:'みたらし団子(山崎)', unit:'本', kcal:121, p:1.5, f:0.3, c:28.2 },
  { id:'f11', name:'ローソン つぶあんぱん4個入', unit:'個', kcal:124, p:3.5, f:1.2, c:25.6 },
  { id:'f12', name:'十勝バターチョコチップスティック', unit:'本', kcal:118, p:2.3, f:3.8, c:19.0 },
  { id:'f13', name:'ザバス プロテインドリンク200ml', unit:'本', kcal:107, p:20.0, f:0, c:6.8 },
  { id:'f14', name:'ローソン サラダチキン(110g)', unit:'個', kcal:141, p:30.3, f:2.1, c:0.2 },
  { id:'f15', name:'ローソン いちごショートケーキクレープ', unit:'個', kcal:263, p:3.4, f:17.6, c:23.0 },
  { id:'f16', name:'卵(全卵)', unit:'個', kcal:151, p:12.3, f:10.3, c:0.3 },
  { id:'f17', name:'ゆで卵', unit:'個', kcal:151, p:12.3, f:10.3, c:0.3 },
  { id:'f18', name:'鶏もも肉', unit:'g', kcal:204, p:18.8, f:14.2, c:0 },
  { id:'f19', name:'合挽き肉', unit:'g', kcal:200, p:17.1, f:13.8, c:0.1 },
  { id:'f20', name:'ベーコン', unit:'g', kcal:405, p:12.9, f:39.3, c:0.3 },
  { id:'f21', name:'モッツァレラチーズ', unit:'g', kcal:289, p:24.0, f:21.0, c:1.0 },
  { id:'f22', name:'蒸かしサツマイモ', unit:'g', kcal:163, p:1.2, f:0.2, c:38.8 },
  { id:'f23', name:'ジャガイモ', unit:'g', kcal:76, p:1.6, f:0.1, c:17.6 },
  { id:'f24', name:'人参', unit:'g', kcal:39, p:0.7, f:0.1, c:9.3 },
  { id:'f25', name:'オリーブオイル(大さじ1)', unit:'個', kcal:120, p:0, f:13.0, c:0 },
  { id:'f26', name:'マスタードオイル(大さじ1)', unit:'個', kcal:115, p:0, f:12.9, c:0 },
  { id:'f27', name:'鶏油(大さじ1)', unit:'個', kcal:115, p:0, f:12.9, c:0 },
];

let foods = JSON.parse(localStorage.getItem('foods') || 'null') || DEFAULT_FOODS;
let days = JSON.parse(localStorage.getItem('days') || '{}');
let gymLogs = JSON.parse(localStorage.getItem('gymLogs') || '{}');

// Current state
let currentDay = { meals:[], fit:null, sleepStart:'', sleepEnd:'' };
let bpSets = [];
let cardioList = [];
let exerciseList = [];
let selectedFood = null;
let currentAddFoodList = [...foods];

// ==================== INIT ====================
function init() {
  const today = (() => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
  document.getElementById('today-date').value = today;
  document.getElementById('gym-date').value = today;
  document.getElementById('header-date').textContent = formatDateJP(today);

  // Set default time
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('add-time-db').value = timeStr;
  document.getElementById('add-time-manual').value = timeStr;

  loadDay();
  renderFoodDB();
  document.getElementById('sleep-start').addEventListener('change', updateSleepDuration);
  document.getElementById('sleep-end').addEventListener('change', updateSleepDuration);
  document.getElementById('db-unit').addEventListener('change', updateDBUnitNote);
}

function formatDateJP(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
}

// ==================== TODAY ====================
function loadDay() {
  const date = document.getElementById('today-date').value;
  document.getElementById('header-date').textContent = formatDateJP(date);
  if (days[date]) {
    currentDay = JSON.parse(JSON.stringify(days[date]));
  } else {
    currentDay = { meals:[], fit:null, sleepStart:'', sleepEnd:'' };
  }
  document.getElementById('sleep-start').value = currentDay.sleepStart || '';
  document.getElementById('sleep-end').value = currentDay.sleepEnd || '';
  document.getElementById('fit-kcal').value = currentDay.fit || '';
  renderMeals();
  updateTotals();
  updateSleepDuration();
}

function updateSleepDuration() {
  const s = document.getElementById('sleep-start').value;
  const e = document.getElementById('sleep-end').value;
  if (s && e) {
    let sm = toMin(s), em = toMin(e);
    if (em <= sm) em += 24*60;
    const dur = em - sm;
    const h = Math.floor(dur/60), m = dur%60;
    document.getElementById('sleep-duration').textContent = `睡眠時間: ${h}時間${m}分`;
  } else {
    document.getElementById('sleep-duration').textContent = '';
  }
  currentDay.sleepStart = document.getElementById('sleep-start').value;
  currentDay.sleepEnd = document.getElementById('sleep-end').value;
}

function toMin(t) {
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

function renderMeals() {
  const list = document.getElementById('meal-list');
  if (!currentDay.meals.length) {
    list.innerHTML = '<div class="empty">食事記録なし</div>';
    return;
  }
  const sorted = [...currentDay.meals].sort((a,b) => (a.time||'').localeCompare(b.time||''));
  list.innerHTML = sorted.map((m,i) => `
    <div class="meal-entry">
      <div class="meal-info">
        <div class="meal-name">${m.name}</div>
        <div class="meal-detail">${m.kcal}kcal P${(m.p||0).toFixed(1)} F${(m.f||0).toFixed(1)} C${(m.c||0).toFixed(1)}</div>
        ${m.time ? `<div class="meal-time">${m.time}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <div class="meal-kcal">${m.kcal}</div>
        <button class="btn btn-danger" onclick="removeMeal(${currentDay.meals.indexOf(m)})">削除</button>
      </div>
    </div>
  `).join('');
}

function removeMeal(idx) {
  currentDay.meals.splice(idx, 1);
  renderMeals();
  updateTotals();
}

function updateTotals() {
  const totK = round1(currentDay.meals.reduce((s,m)=>s+m.kcal,0));
  const totP = round1(currentDay.meals.reduce((s,m)=>s+(m.p||0),0));
  const totF = round1(currentDay.meals.reduce((s,m)=>s+(m.f||0),0));
  const totC = round1(currentDay.meals.reduce((s,m)=>s+(m.c||0),0));
  document.getElementById('total-kcal').textContent = totK;
  document.getElementById('total-p').textContent = totP;
  document.getElementById('total-f').textContent = totF;
  document.getElementById('total-c').textContent = totC;
  updateBalance();
}

function updateBalance() {
  const fit = parseFloat(document.getElementById('fit-kcal').value) || 0;
  const intake = currentDay.meals.reduce((s,m)=>s+m.kcal,0);
  currentDay.fit = fit || null;
  const el = document.getElementById('balance-val');
  if (!fit) { el.textContent = '—'; el.className = 'balance-val'; return; }
  const date = document.getElementById('today-date').value;
  const cardioKcal = gymLogs[date]?.cardioList?.reduce((s,c)=>s+c.kcal,0)||0;
  const bal = round1(intake - fit - cardioKcal);
  el.textContent = (bal >= 0 ? '+' : '') + bal;
  el.className = 'balance-val ' + (bal >= 0 ? 'plus' : 'minus');
}

function saveDay() {
  const date = document.getElementById('today-date').value;
  currentDay.sleepStart = document.getElementById('sleep-start').value;
  currentDay.sleepEnd = document.getElementById('sleep-end').value;
  currentDay.fit = parseFloat(document.getElementById('fit-kcal').value) || null;
  days[date] = JSON.parse(JSON.stringify(currentDay));
  localStorage.setItem('days', JSON.stringify(days));
  showToast('保存しました ✓');
}

// ==================== ADD FOOD MODAL ====================
function openAddFood() {
  const now = new Date();
  const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('add-time-db').value = t;
  document.getElementById('add-time-manual').value = t;
  document.getElementById('add-food-search').value = '';
  document.getElementById('selected-food-info').style.display = 'none';
  selectedFood = null;
  filterAddFoods('');
  openModal('modal-add-food');
}

function filterAddFoods(query) {
  const q = query.toLowerCase();
  const filtered = foods.filter(f => f.name.toLowerCase().includes(q));
  const list = document.getElementById('add-food-list');
  if (!filtered.length) { list.innerHTML = '<div class="empty">見つかりません</div>'; return; }
  list.innerHTML = filtered.map(f => `
    <div class="food-item" onclick="selectFood('${f.id}')">
      <div>
        <div class="food-name">${f.name}</div>
        <div class="food-detail">${f.kcal}kcal/${f.unit === 'g' ? '100g' : '1'+f.unit} P${f.p} F${f.f} C${f.c}</div>
      </div>
      <div class="food-kcal">${f.kcal}</div>
    </div>
  `).join('');
}

function selectFood(id) {
  selectedFood = foods.find(f => f.id === id);
  if (!selectedFood) return;
  document.getElementById('selected-food-name').textContent = selectedFood.name;
  document.getElementById('add-unit-label').textContent = selectedFood.unit === 'g' ? '量 (g)' : `個数 (${selectedFood.unit})`;
  document.getElementById('add-amount').value = selectedFood.unit === 'g' ? '100' : '1';
  document.getElementById('selected-food-info').style.display = 'block';
  previewNutrition();
  document.getElementById('add-food-list').scrollTop = 0;
}

function previewNutrition() {
  if (!selectedFood) return;
  const amt = parseFloat(document.getElementById('add-amount').value) || 0;
  let mult = selectedFood.unit === 'g' ? amt/100 : amt;
  const k = round1(selectedFood.kcal * mult);
  const p = round1(selectedFood.p * mult);
  const f = round1(selectedFood.f * mult);
  const c = round1(selectedFood.c * mult);
  document.getElementById('add-preview').textContent = `→ ${k}kcal  P${p}  F${f}  C${c}`;
}

function confirmAddFood() {
  if (!selectedFood) return;
  const amt = parseFloat(document.getElementById('add-amount').value) || 0;
  if (!amt) { showToast('量を入力してください'); return; }
  let mult = selectedFood.unit === 'g' ? amt/100 : amt;
  const meal = {
    name: selectedFood.unit === 'g' ? `${selectedFood.name} ${amt}g` : `${selectedFood.name} ${amt}${selectedFood.unit}`,
    kcal: round1(selectedFood.kcal * mult),
    p: round1(selectedFood.p * mult),
    f: round1(selectedFood.f * mult),
    c: round1(selectedFood.c * mult),
    time: document.getElementById('add-time-db').value,
  };
  currentDay.meals.push(meal);
  renderMeals();
  updateTotals();
  document.getElementById('selected-food-info').style.display = 'none';
  document.getElementById('add-amount').value = selectedFood.unit === 'g' ? '100' : '1';
  selectedFood = null;
  closeModal('modal-add-food');
  showToast('追加しました ✓');
}

function addManualFood() {
  const name = document.getElementById('manual-name').value.trim();
  const kcal = parseFloat(document.getElementById('manual-kcal').value) || 0;
  if (!name || !kcal) { showToast('品名とkcalは必須です'); return; }
  const meal = {
    name,
    kcal,
    p: parseFloat(document.getElementById('manual-p').value) || 0,
    f: parseFloat(document.getElementById('manual-f').value) || 0,
    c: parseFloat(document.getElementById('manual-c').value) || 0,
    time: document.getElementById('add-time-manual').value,
  };
  currentDay.meals.push(meal);
  renderMeals();
  updateTotals();
  ['manual-name','manual-kcal','manual-p','manual-f','manual-c'].forEach(id => document.getElementById(id).value = '');
  closeModal('modal-add-food');
  showToast('追加しました ✓');
}

function switchAddTab(tab) {
  document.getElementById('add-tab-db').style.display = tab === 'db' ? 'block' : 'none';
  document.getElementById('add-tab-manual').style.display = tab === 'manual' ? 'block' : 'none';
  document.getElementById('tab-db').className = 'tab-btn' + (tab === 'db' ? ' active' : '');
  document.getElementById('tab-manual').className = 'tab-btn' + (tab === 'manual' ? ' active' : '');
}

// ==================== HISTORY ====================
function renderHistory() {
  const list = document.getElementById('history-list');
  const keys = Object.keys(days).sort().reverse();
  if (!keys.length) { list.innerHTML = '<div class="empty">記録がありません</div>'; return; }
  list.innerHTML = keys.map(date => {
    const d = days[date];
    const intake = round1(d.meals.reduce((s,m)=>s+m.kcal,0));
    const p = round1(d.meals.reduce((s,m)=>s+(m.p||0),0));
    const cardioKcal = gymLogs[date]?.cardioList?.reduce((s,c)=>s+c.kcal,0)||0;
    const bal = d.fit ? round1(intake - d.fit - cardioKcal) : null;
    const balStr = bal !== null ? `<span class="history-balance" style="color:${bal>=0?'var(--accent3)':'var(--accent)'}">${bal>=0?'+':''}${bal}</span>` : '';
    const sleepStr = (d.sleepStart && d.sleepEnd) ? sleepDur(d.sleepStart, d.sleepEnd) : null;
    const bodyEntry = bodyLogs[date];
    return `
      <div class="history-item" onclick="showDayDetail('${date}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div class="history-date" style="margin-bottom:4px;">${formatDateJP(date)}</div>
          <div style="display:flex;gap:8px;align-items:center;">
            ${bodyEntry?.weight ? `<span style="font-family:'Space Mono',monospace;font-size:12px;color:var(--accent2)">${bodyEntry.weight}kg</span>` : ''}
            ${bodyEntry?.fat ? `<span style="font-family:'Space Mono',monospace;font-size:12px;color:var(--yellow)">${bodyEntry.fat}%</span>` : ''}
            ${balStr}
          </div>
        </div>
        <div class="history-stats">
          <div class="history-stat">摂取 <span>${intake}</span>kcal</div>
          ${d.fit ? `<div class="history-stat">消費 <span>${round1(d.fit + cardioKcal)}</span>kcal</div>` : ''}
          <div class="history-stat">P <span>${p}</span>g</div>
          ${sleepStr ? `<div class="history-stat">💤 <span>${sleepStr}</span></div>` : ''}
          ${gymLogs[date] ? `<div class="history-stat">🏋️ <span>${(()=>{const g=gymLogs[date];const vol=g.bpSets?.reduce((s,b)=>s+b.vol,0)||0;const cardioKcal=g.cardioList?.reduce((s,c)=>s+c.kcal,0)||0;return [vol?'BP '+vol.toLocaleString()+'kg':'',cardioKcal?'有酸素 '+cardioKcal+'kcal':''].filter(Boolean).join(' / ')||'記録あり';})()} </span></div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function sleepDur(s, e) {
  let sm = toMin(s), em = toMin(e);
  if (em <= sm) em += 24*60;
  const dur = em - sm;
  return `${Math.floor(dur/60)}h${dur%60}m`;
}

function showDayDetail(date) {
  const d = days[date];
  document.getElementById('detail-date-title').textContent = formatDateJP(date);
  const intake = round1(d.meals.reduce((s,m)=>s+m.kcal,0));
  const p = round1(d.meals.reduce((s,m)=>s+(m.p||0),0));
  const f = round1(d.meals.reduce((s,m)=>s+(m.f||0),0));
  const c = round1(d.meals.reduce((s,m)=>s+(m.c||0),0));
  const detailCardioKcal = gymLogs[date]?.cardioList?.reduce((s,c)=>s+c.kcal,0)||0;
  const bal = d.fit ? round1(intake - d.fit - detailCardioKcal) : null;
  const sorted = [...d.meals].sort((a,b)=>(a.time||'').localeCompare(b.time||''));

// ==================== GYM ====================
function addBpSet() {
  const w = parseFloat(document.getElementById('bp-weight').value);
  const r = parseFloat(document.getElementById('bp-reps').value);
  const s = parseFloat(document.getElementById('bp-sets').value);
  if (!w || !r || !s) { showToast('重量・回数・セット数を入力してください'); return; }
  bpSets.push({ w, r, s, vol: w*r*s });
  renderBpList();
}

function renderBpList() {
  const list = document.getElementById('bp-list');
  if (!bpSets.length) { list.innerHTML = ''; document.getElementById('bp-total').textContent = '0 kg'; return; }
  list.innerHTML = bpSets.map((b,i) => `
    <div class="gym-set">
      <span class="gym-set-info">${b.w}kg × ${b.r}rep × ${b.s}set</span>
      <span class="gym-set-vol">${b.vol}kg</span>
      <button class="btn btn-danger" onclick="bpSets.splice(${i},1);renderBpList()">✕</button>
    </div>
  `).join('');
  const total = bpSets.reduce((s,b) => s+b.vol, 0);
  document.getElementById('bp-total').textContent = total.toLocaleString() + ' kg';
}

function addCardio() {
  const type = document.getElementById('cardio-type').value;
  const min = parseFloat(document.getElementById('cardio-min').value);
  const kcal = parseFloat(document.getElementById('cardio-kcal').value) || 0;
  if (!min) { showToast('時間を入力してください'); return; }
  cardioList.push({ type, min, kcal });
  renderCardioList();
}

function renderCardioList() {
  const list = document.getElementById('cardio-list');
  if (!cardioList.length) { list.innerHTML = ''; document.getElementById('cardio-total').textContent = '0 kcal'; return; }
  list.innerHTML = cardioList.map((c,i) => `
    <div class="gym-set">
      <span class="gym-set-info">${c.type} ${c.min}分</span>
      <span class="gym-set-vol">${c.kcal}kcal</span>
      <button class="btn btn-danger" onclick="cardioList.splice(${i},1);renderCardioList()">✕</button>
    </div>
  `).join('');
  const total = cardioList.reduce((s,c)=>s+c.kcal,0);
  document.getElementById('cardio-total').textContent = total + ' kcal';
}

function addExercise() {
  const name = document.getElementById('ex-name').value.trim();
  const w = parseFloat(document.getElementById('ex-weight').value) || 0;
  const r = parseFloat(document.getElementById('ex-reps').value) || 0;
  const s = parseFloat(document.getElementById('ex-sets').value) || 0;
  if (!name) { showToast('種目名を入力してください'); return; }
  exerciseList.push({ name, w, r, s });
  renderExList();
}

function renderExList() {
  const list = document.getElementById('ex-list');
  if (!exerciseList.length) { list.innerHTML = ''; return; }
  list.innerHTML = exerciseList.map((e,i) => `
    <div class="gym-set">
      <span class="gym-set-info">${e.name}${e.w?` ${e.w}kg`:''}${e.r?` ×${e.r}rep`:''}${e.s?` ×${e.s}set`:''}</span>
      <button class="btn btn-danger" onclick="exerciseList.splice(${i},1);renderExList()">✕</button>
    </div>
  `).join('');
}

function saveGym() {
  const date = document.getElementById('gym-date').value;
  gymLogs[date] = { bpSets:[...bpSets], cardioList:[...cardioList], exerciseList:[...exerciseList] };
  localStorage.setItem('gymLogs', JSON.stringify(gymLogs));
  showToast('ジム記録を保存しました ✓');
}

// ==================== FOOD DB ====================
function renderFoodDB(query='') {
  const q = query.toLowerCase();
  const filtered = foods.filter(f => f.name.toLowerCase().includes(q));
  const list = document.getElementById('food-db-list');
  if (!filtered.length) { list.innerHTML = '<div class="empty">見つかりません</div>'; return; }
  list.innerHTML = filtered.map(f => `
    <div class="food-item">
      <div>
        <div class="food-name">${f.name}</div>
        <div class="food-detail">${f.kcal}kcal/${f.unit==='g'?'100g':'1'+f.unit} P${f.p} F${f.f} C${f.c}</div>
      </div>
      ${f.custom ? `<button class="btn btn-danger btn-sm" onclick="deleteFoodDB('${f.id}')">削除</button>` : ''}
    </div>
  `).join('');
}

function filterFoods(q) { renderFoodDB(q); }

function openAddFoodDB() { openModal('modal-add-food-db'); }

function updateDBUnitNote() {
  const unit = document.getElementById('db-unit').value;
  const note = document.getElementById('db-unit-note');
  note.textContent = unit === 'g' ? '100gあたりの栄養値を入力' : `1${unit}あたりの栄養値を入力`;
}

function addFoodDB() {
  const name = document.getElementById('db-name').value.trim();
  const kcal = parseFloat(document.getElementById('db-kcal').value);
  if (!name || !kcal) { showToast('品名とkcalは必須です'); return; }
  const food = {
    id: 'c_' + Date.now(),
    name,
    unit: document.getElementById('db-unit').value,
    kcal,
    p: parseFloat(document.getElementById('db-p').value) || 0,
    f: parseFloat(document.getElementById('db-f').value) || 0,
    c: parseFloat(document.getElementById('db-c').value) || 0,
    custom: true,
  };
  foods.push(food);
  saveFoods();
  renderFoodDB();
  ['db-name','db-kcal','db-p','db-f','db-c'].forEach(id => document.getElementById(id).value = '');
  closeModal('modal-add-food-db');
  showToast('食品を追加しました ✓');
}

function deleteFoodDB(id) {
  if (!confirm('この食品を削除しますか？')) return;
  foods = foods.filter(f => f.id !== id);
  saveFoods();
  renderFoodDB();
}

function saveFoods() { localStorage.setItem('foods', JSON.stringify(foods)); }

// ==================== UTILS ====================
function round1(v) { return Math.round(v*10)/10; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'foods') renderFoodDB();
  if (name === 'body') { const _d=new Date(); const _ds=`${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`; document.getElementById('body-date').value=_ds; renderBodyLog(); renderGraph(); }
}

// ==================== EXPORT / IMPORT ====================
function exportData() {
  const data = { days, gymLogs, foods: foods.filter(f => f.custom), exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `デイリー記録_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('エクスポートしました ✓');
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.days) { Object.assign(days, data.days); localStorage.setItem('days', JSON.stringify(days)); }
      if (data.gymLogs) { Object.assign(gymLogs, data.gymLogs); localStorage.setItem('gymLogs', JSON.stringify(gymLogs)); }
      if (data.foods) {
        data.foods.forEach(f => { if (!foods.find(x => x.id === f.id)) foods.push(f); });
        saveFoods();
      }
      renderHistory();
      showToast(`インポート完了: ${Object.keys(data.days||{}).length}日分 ✓`);
    } catch(err) { showToast('インポートに失敗しました'); }
  };
  reader.readAsText(file);
}

// Close modal on overlay click

// ==================== BODY COMPOSITION ====================
let bodyLogs = JSON.parse(localStorage.getItem('bodyLogs') || '{}');
let graphType = 'balance';
let graphRange = 7;
let customRangeFrom = null;
let customRangeTo = null;

function saveBody() {
  const date = document.getElementById('body-date').value;
  const w = parseFloat(document.getElementById('body-weight').value) || null;
  const f = parseFloat(document.getElementById('body-fat').value) || null;
  const memo = document.getElementById('body-memo').value.trim();
  if (!w && !f) { showToast('体重か体脂肪率を入力してください'); return; }
  bodyLogs[date] = { weight: w, fat: f, memo };
  localStorage.setItem('bodyLogs', JSON.stringify(bodyLogs));
  document.getElementById('body-weight').value = '';
  document.getElementById('body-fat').value = '';
  document.getElementById('body-memo').value = '';
  renderBodyLog();
  renderGraph();
  showToast('体組成を保存しました ✓');
}

function renderBodyLog() {
  const list = document.getElementById('body-log-list');
  const keys = Object.keys(bodyLogs).sort().reverse().slice(0, 30);
  if (!keys.length) { list.innerHTML = '<div class="empty">記録がありません</div>'; return; }
  list.innerHTML = keys.map(date => {
    const b = bodyLogs[date];
    return `<div class="history-item" style="cursor:default;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="history-date" style="margin-bottom:0;">${formatDateJP(date)}</div>
        <div style="display:flex;gap:14px;align-items:center;">
          ${b.weight ? `<span style="font-family:'Space Mono',monospace;font-size:14px;color:var(--accent2)">${b.weight}<span style="font-size:10px;color:var(--text3)">kg</span></span>` : ''}
          ${b.fat ? `<span style="font-family:'Space Mono',monospace;font-size:14px;color:var(--yellow)">${b.fat}<span style="font-size:10px;color:var(--text3)">%</span></span>` : ''}
          <button class="btn btn-danger" onclick="deleteBody('${date}')">削除</button>
        </div>
      </div>
      ${b.memo ? `<div style="font-size:11px;color:var(--text3);margin-top:4px;">${b.memo}</div>` : ''}
    </div>`;
  }).join('');
}

function deleteBody(date) {
  delete bodyLogs[date];
  localStorage.setItem('bodyLogs', JSON.stringify(bodyLogs));
  renderBodyLog();
  renderGraph();
}

function setGraphRange(n) {
  graphRange = n;
  customRangeFrom = null;
  customRangeTo = null;
  document.getElementById('custom-range').style.display = 'none';
  document.querySelectorAll('.range-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.r === String(n));
  });
  renderGraph();
}
function toggleCustomRange() {
  const el = document.getElementById('custom-range');
  const show = el.style.display === 'none' || el.style.display === '';
  el.style.display = show ? 'block' : 'none';
  if (show) {
    const allDates = Object.keys(days).sort();
    if (allDates.length) {
      document.getElementById('range-from').value = allDates[Math.max(0,allDates.length-30)];
      document.getElementById('range-to').value = allDates[allDates.length-1];
    }
  }
  document.querySelectorAll('.range-btn').forEach(b => b.classList.toggle('active', b.dataset.r === 'custom' && show));
}
function applyCustomRange() {
  customRangeFrom = document.getElementById('range-from').value;
  customRangeTo = document.getElementById('range-to').value;
  if (!customRangeFrom || !customRangeTo) return;
  graphRange = -1;
  renderGraph();
}
function switchGraph(type) {
  graphType = type;
  ['balance','pfc','body','sleep','gym'].forEach(t => {
    document.getElementById('gtab-'+t).className = 'tab-btn' + (t===type?' active':'');
  });
  renderGraph();
}

// ==================== GRAPH ====================
let chartInst = null;

function getDateRange() {
  const allDates = Object.keys(days).sort();
  if (!allDates.length) return [];
  if (graphRange === -1 && customRangeFrom && customRangeTo) {
    return allDates.filter(d => d >= customRangeFrom && d <= customRangeTo);
  }
  if (graphRange === 0) return allDates;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - graphRange);
  const cutStr = cutoff.toISOString().split('T')[0];
  return allDates.filter(d => d >= cutStr);
}

function renderGraph() {
  const canvas = document.getElementById('main-chart');
  const ctx = canvas.getContext('2d');
  const dates = getDateRange();

  // Clear
  if (chartInst) { chartInst.destroy(); chartInst = null; }

  if (!dates.length) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    return;
  }

  const labels = dates.map(d => { const dd=new Date(d+'T12:00:00'); return `${dd.getMonth()+1}/${dd.getDate()}`; });

  const style = getComputedStyle(document.documentElement);
  const c = {
    accent: '#4ade80', accent2: '#22d3ee', accent3: '#f97316',
    red: '#f87171', yellow: '#fbbf24', purple: '#a78bfa',
    border: '#2a2d32', text2: '#9aa0aa', bg3: '#1e2023'
  };

  let datasets = [];

  if (graphType === 'balance') {
    const bal = dates.map(d => {
      const day = days[d];
      if (!day || !day.fit) return null;
      const gCardio = gymLogs[d]?.cardioList?.reduce((s,c)=>s+c.kcal,0)||0;
      return round1(day.meals.reduce((s,m)=>s+m.kcal,0) - day.fit - gCardio);
    });
    const fit = dates.map(d => d in gymLogs ? round1((days[d]?.fit||0)+(gymLogs[d]?.cardioList?.reduce((s,c)=>s+c.kcal,0)||0)) : (days[d]?.fit||null));
    const intake = dates.map(d => days[d] ? round1(days[d].meals.reduce((s,m)=>s+m.kcal,0)) : null);
    datasets = [
      { label:'摂取', data: intake, borderColor: c.accent2, backgroundColor: c.accent2+'22', tension:0.3, pointRadius:2, fill:false },
      { label:'消費', data: fit, borderColor: c.accent, backgroundColor: c.accent+'22', tension:0.3, pointRadius:2, fill:false },
      { label:'収支', data: bal, borderColor: c.accent3, backgroundColor: d => d.raw >= 0 ? c.accent3+'44' : c.accent+'44',
        tension:0.3, pointRadius:3, fill: { target:'origin', above: c.accent3+'33', below: c.accent+'33' } },
    ];
  } else if (graphType === 'pfc') {
    const pp = dates.map(d => days[d] ? round1(days[d].meals.reduce((s,m)=>s+(m.p||0),0)) : null);
    const ff = dates.map(d => days[d] ? round1(days[d].meals.reduce((s,m)=>s+(m.f||0),0)) : null);
    const cc = dates.map(d => days[d] ? round1(days[d].meals.reduce((s,m)=>s+(m.c||0),0)) : null);
    datasets = [
      { label:'P(g)', data: pp, borderColor: c.accent, tension:0.3, pointRadius:2, fill:false },
      { label:'F(g)', data: ff, borderColor: c.yellow, tension:0.3, pointRadius:2, fill:false },
      { label:'C(g)', data: cc, borderColor: c.accent3, tension:0.3, pointRadius:2, fill:false },
    ];
  } else if (graphType === 'body') {
    const weights = dates.map(d => bodyLogs[d]?.weight || null);
    const fats = dates.map(d => bodyLogs[d]?.fat || null);
    // Daily calorie balance
    const dailyBal = dates.map(d => {
      const day = days[d];
      if (!day || !day.fit) return null;
      const gCardio2 = gymLogs[d]?.cardioList?.reduce((s,c)=>s+c.kcal,0)||0;
      return round1(day.meals.reduce((s,m)=>s+m.kcal,0) - day.fit - gCardio2);
    });
    datasets = [
      { label:'体重(kg)', data: weights, borderColor: c.accent2, tension:0.3, pointRadius:4, fill:false, yAxisID:'y', spanGaps:true },
      { label:'体脂肪率(%)', data: fats, borderColor: c.yellow, tension:0.3, pointRadius:4, fill:false, yAxisID:'y2', spanGaps:true },
      { label:'日次収支(kcal)', data: dailyBal, borderColor: c.accent3, tension:0.2, pointRadius:2, fill:false, borderDash:[4,4], yAxisID:'y3' },
    ];
  } else if (graphType === 'sleep') {
    const dur = dates.map(d => {
      const day = days[d];
      if (!day || !day.sleepStart || !day.sleepEnd) return null;
      let sm = toMin(day.sleepStart), em = toMin(day.sleepEnd);
      if (em <= sm) em += 24*60;
      return round1((em-sm)/60);
    });
    const bal = dates.map(d => {
      const day = days[d];
      if (!day || !day.fit) return null;
      const gCardio3 = gymLogs[d]?.cardioList?.reduce((s,c)=>s+c.kcal,0)||0;
      return round1((day.meals.reduce((s,m)=>s+m.kcal,0) - day.fit - gCardio3)/1000);
    });
    datasets = [
      { label:'睡眠時間(h)', data: dur, borderColor: c.purple, backgroundColor: c.purple+'33', tension:0.3, pointRadius:3, fill:true, yAxisID:'y' },
      { label:'収支(÷1000)', data: bal, borderColor: c.accent3, tension:0.3, pointRadius:2, fill:false, borderDash:[4,4], yAxisID:'y2' },
    ];
  } else if (graphType === 'gym') {
    // Use all dates that have gym logs (not filtered by days)
    const gymDates = Object.keys(gymLogs).sort().filter(d => graphRange === 0 || d >= (() => { const c=new Date(); c.setDate(c.getDate()-graphRange); return c.toISOString().split('T')[0]; })());
    const gymLabels = gymDates.map(d => { const dd=new Date(d+'T12:00:00'); return `${dd.getMonth()+1}/${dd.getDate()}`; });
    const bpVols = gymDates.map(d => gymLogs[d]?.bpSets?.reduce((s,b)=>s+b.vol,0)||null);
    const cardioKcals = gymDates.map(d => {
      const kcal = gymLogs[d]?.cardioList?.reduce((s,c)=>s+c.kcal,0)||0;
      return kcal > 0 ? kcal : null;
    });
    const weights = gymDates.map(d => bodyLogs[d]?.weight||null);
    // Override labels for this graph
    if (chartInst) { chartInst.destroy(); chartInst = null; }
    chartInst = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: gymLabels,
        datasets: [
          { label:'BP総挙上量(kg)', data: bpVols, backgroundColor: c.accent+'88', borderColor: c.accent, borderWidth:1, yAxisID:'y', order:2 },
          { label:'有酸素(kcal)', data: cardioKcals, backgroundColor: c.accent2+'88', borderColor: c.accent2, borderWidth:1, yAxisID:'y', order:2 },
          { label:'体重(kg)', data: weights, type:'line', borderColor: c.yellow, tension:0.3, pointRadius:4, fill:false, yAxisID:'y2', order:1, spanGaps:true },
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:true,
        interaction:{ mode:'index', intersect:false },
        plugins: {
          legend:{ labels:{ color:c.text2, font:{size:10}, boxWidth:12, padding:8 } },
          tooltip:{ backgroundColor:'#1e2023', titleColor:'#e8eaed', bodyColor:'#9aa0aa', borderColor:'#2a2d32', borderWidth:1 }
        },
        scales: {
          y:  { position:'left',  grid:{color:c.border}, ticks:{color:c.text2,font:{size:10}}, title:{display:true,text:'kg / kcal',color:c.text2,font:{size:9}} },
          y2: { position:'right', grid:{drawOnChartArea:false}, ticks:{color:c.text2,font:{size:10}}, title:{display:true,text:'体重(kg)',color:c.text2,font:{size:9}} },
          x:  { grid:{color:c.border}, ticks:{color:c.text2,font:{size:9},maxRotation:45} }
        }
      }
    });
    return; // early return, chart already rendered
  }

  const scales = graphType === 'body' ? {
    y:  { position:'left',  grid:{color:c.border}, ticks:{color:c.text2,font:{size:10}}, title:{display:true,text:'kg',color:c.text2,font:{size:9}} },
    y2: { position:'right', grid:{drawOnChartArea:false}, ticks:{color:c.text2,font:{size:10}}, title:{display:true,text:'%',color:c.text2,font:{size:9}} },
    y3: { position:'right', grid:{drawOnChartArea:false}, ticks:{color:c.text2,font:{size:9}}, title:{display:true,text:'日次収支(kcal)',color:c.text2,font:{size:9}},
          offset:true },
    x:  { grid:{color:c.border}, ticks:{color:c.text2,font:{size:9},maxRotation:45} }
  } : graphType === 'sleep' ? {
    y: { position:'left', grid:{color:c.border}, ticks:{color:c.text2,font:{size:10}} },
    y2: { position:'right', grid:{drawOnChartArea:false}, ticks:{color:c.text2,font:{size:10}} },
    x: { grid:{color:c.border}, ticks:{color:c.text2,font:{size:9},maxRotation:45} }
  } : {
    y: { grid:{color:c.border}, ticks:{color:c.text2,font:{size:10}} },
    x: { grid:{color:c.border}, ticks:{color:c.text2,font:{size:9},maxRotation:45} }
  };

  chartInst = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { labels: { color: c.text2, font:{size:10}, boxWidth:12, padding:8 } },
        tooltip: { backgroundColor: '#1e2023', titleColor: '#e8eaed', bodyColor: '#9aa0aa', borderColor: '#2a2d32', borderWidth:1 }
      },
      scales
    }
  });
}
